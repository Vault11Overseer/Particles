<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Particles Playground</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        #settings-panel {
            display: none;
        }

        #settings-panel.active {
            display: flex;
        }

        #settings-panel input,
        #settings-panel select {
            font-size: 16px;
            padding: 5px;
        }
    </style>

</head>

<body>
    <!-- CANVAS -->
    <canvas id="canvas" style="
        position: absolute;
        background: rgb(22, 22, 22);
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        touch-action: auto;
        z-index: 1;">
    </canvas>

    <!-- SETTINGS UI -->
    <div id="settings-ui" style="
        position: fixed;
        top: 80px;
        top: calc(80px + env(safe-area-inset-top));
        left: 20px;
        left: calc(20px + env(safe-area-inset-left));
        z-index: 100;
        font-family: Arial, sans-serif;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: flex-start;">

        <!-- BUTTON -->
        <button id="menu-btn" style="
                position: fixed;
                top: 20px;
                left: 20px;
                z-index: 999999;
                width: 48px;
                height: 48px;
                background: black;
                color: white;
                font-size: 24px;
                touch-action: manipulation;
                cursor: pointer;
            ">
            ☰
        </button>

        <!-- SETTINGS PANEL -->
        <div id="settings-panel" style="margin-top: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 8px;
            flex-direction: column;
            gap: 10px;
            min-width: 150px;">
            <label for="density">Density</label>
            <input type="range" id="density" min="1" max="20" value="10" <label for="shape">Shape</label>
            <select id="shape">
                <option value="circle">Circle</option>
                <option value="square">Square</option>
            </select>
        </div>
    </div>
    <!-- MAIN JS -->
    <script src="main.js"></script>
</body>

</html>
